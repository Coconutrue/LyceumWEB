<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/map.css">
    <title>Карта мира</title>
</head>
<body>

<header>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <h3 class="logo-text mb-0">Clan Wars</h3>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <a href="{{ url_for('home') }}" class="btn btn-outline-warning">
                    <i class="fas fa-home me-2"></i>На главную
                </a>
            </div>
        </div>
    </nav>
</header>

<div class="container text-center mt-4">
    <div class="coords-info">
        <i class="fas fa-location-dot text-warning me-2"></i>
        <span class="text-white">
            Карта
        </span>
    </div>
</div>

<div class="map-container">
    <iframe
        src="{% if x is not none and z is not none %}
                http://217.106.107.168:38815/#world:{{ x }}:64:{{ z }}:120:0:0:0:0:perspective
            {% else %}
                http://217.106.107.168:38815/#world:0:64:0:600:0:0:0:0:perspective
            {% endif %}"
        title="BlueMap">
    </iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
